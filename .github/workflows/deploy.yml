name: Deploy to Netlify

# Production deploy on every push to main (from anyone — Jason or Jake).
# Pull requests get a preview deploy with a unique URL posted back as a
# commit status, so reviewers can see changes before they merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight deploy if a newer commit lands on the same ref.
concurrency:
  group: netlify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # main branch → production
            npx netlify deploy --build --prod \
              --message "CI: ${{ github.sha }} by ${{ github.actor }}"
          else
            # pull request → draft preview
            npx netlify deploy --build \
              --message "PR #${{ github.event.number }}: ${{ github.sha }}"
          fi
